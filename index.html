<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>議事録アプリ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh}
header{background:#2b6cb0;color:white;padding:14px 24px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header h1{font-size:1.2rem;font-weight:700}
.container{max-width:960px;margin:0 auto;padding:20px 14px}
.tabs{display:flex;gap:8px;margin-bottom:18px}
.tab{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .2s}
.tab.active{background:#2b6cb0;color:white}
.tab:not(.active){background:white;color:#4a5568;border:1px solid #e2e8f0}
.tab:not(.active):hover{background:#ebf4ff}
.card{background:white;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px}
.card-title{font-size:.82rem;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.field-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.field{flex:1;min-width:160px}
.field label{display:block;font-size:.8rem;font-weight:600;color:#718096;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.field input{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:.9rem;outline:none;transition:border .2s}
.field input:focus{border-color:#2b6cb0}

/* Speakers */
.speakers-area{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;align-items:center}
.speaker-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:50px;border:2px solid #e2e8f0;background:white;font-size:.85rem;cursor:pointer;transition:all .2s;font-weight:600}
.speaker-chip:hover{border-color:#90cdf4}
.speaker-chip.selected{border-color:#2b6cb0;background:#ebf4ff;color:#2b6cb0}
.speaker-chip .del{color:#a0aec0;font-size:.75rem;margin-left:2px;cursor:pointer}
.speaker-chip .del:hover{color:#e53e3e}
.add-speaker{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:50px;border:2px dashed #cbd5e0;background:white;font-size:.83rem;cursor:pointer;color:#718096;transition:all .2s}
.add-speaker:hover{border-color:#2b6cb0;color:#2b6cb0}
.speaker-color{width:10px;height:10px;border-radius:50%;display:inline-block}

/* Recording */
.rec-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.rec-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border-radius:50px;border:none;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s}
.rec-btn.start{background:#e53e3e;color:white;box-shadow:0 4px 12px rgba(229,62,62,.3)}
.rec-btn.start:hover{background:#c53030;transform:scale(1.03)}
.rec-btn.stop{background:#718096;color:white}
.rec-btn.stop:hover{background:#4a5568}
.pulse{display:inline-block;width:11px;height:11px;background:white;border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:.8}}
.rec-status{font-size:.85rem;color:#718096}
.rec-status.on{color:#e53e3e;font-weight:700}
.interim{background:#fffbeb;border:1px solid #f6e05e;border-radius:8px;padding:9px 13px;margin-bottom:10px;font-size:.88rem;color:#744210;display:none}
.interim.vis{display:block}

/* Log */
.log-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.log-header span{font-size:.82rem;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.04em}
.log{display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto;padding-right:4px}
.log-entry{display:flex;gap:10px;align-items:flex-start;background:#f7fafc;border-radius:8px;padding:9px 12px;border-left:3px solid #cbd5e0}
.log-entry .time{font-size:.78rem;color:#a0aec0;white-space:nowrap;margin-top:2px;min-width:52px}
.log-entry .who{font-size:.8rem;font-weight:700;white-space:nowrap;margin-top:2px}
.log-entry .txt{font-size:.9rem;flex:1;line-height:1.55}
.log-entry .txt[contenteditable]{outline:none;border-bottom:1px dashed #cbd5e0;cursor:text}
.log-entry .del-entry{color:#a0aec0;cursor:pointer;font-size:.8rem;padding:0 4px;margin-top:1px}
.log-entry .del-entry:hover{color:#e53e3e}
.empty-log{text-align:center;padding:30px;color:#a0aec0;font-size:.88rem}

/* Buttons */
.btn{padding:9px 18px;border-radius:8px;border:none;font-size:.87rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:#2b6cb0;color:white}.btn-primary:hover{background:#2c5282}
.btn-secondary{background:#edf2f7;color:#4a5568}.btn-secondary:hover{background:#e2e8f0}
.btn-green{background:#276749;color:white}.btn-green:hover{background:#22543d}
.btn-danger{background:#fff5f5;color:#e53e3e;border:1px solid #fed7d7}.btn-danger:hover{background:#fed7d7}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.btn-sm{padding:4px 10px;border-radius:6px;border:1px solid #e2e8f0;background:white;font-size:.78rem;cursor:pointer;color:#4a5568;transition:all .15s}
.btn-sm:hover{background:#ebf4ff;border-color:#2b6cb0;color:#2b6cb0}

/* List */
.minutes-list{display:flex;flex-direction:column;gap:10px}
.mc{background:white;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:2px solid transparent;transition:all .2s}
.mc:hover{border-color:#bee3f8}
.mc-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.mc-title{font-weight:700;font-size:.97rem}
.mc-date{font-size:.8rem;color:#a0aec0;white-space:nowrap}
.mc-preview{font-size:.83rem;color:#718096;margin-top:5px}
.mc-acts{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.empty{text-align:center;padding:50px 20px;color:#a0aec0}
.empty .ei{font-size:2.8rem;margin-bottom:10px}
.badge{display:inline-block;background:#ebf4ff;color:#2b6cb0;border-radius:50px;padding:2px 9px;font-size:.76rem;font-weight:700;margin-left:6px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#2d3748;color:white;padding:9px 22px;border-radius:50px;font-size:.88rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:200;display:none}
.modal-bg.vis{display:flex}
.modal{background:white;border-radius:14px;padding:24px;width:340px;max-width:95vw}
.modal h3{margin-bottom:14px;font-size:1rem}
.modal input{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:.9rem;outline:none;margin-bottom:10px}
.modal input:focus{border-color:#2b6cb0}
.color-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.color-dot.sel{border-color:#2d3748;transform:scale(1.15)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
@media(max-width:500px){.field-row{flex-direction:column}.actions{flex-direction:column}.rec-row{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<header>
  <span>📋</span>
  <h1>議事録アプリ</h1>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('editor')">✏️ 新規作成・編集</button>
    <button class="tab" onclick="switchTab('list')" id="listTabBtn">📂 保存済み <span class="badge" id="countBadge">0</span></button>
  </div>

  <div id="editorTab">
    <!-- Meta -->
    <div class="card">
      <div class="field-row">
        <div class="field">
          <label>会議タイトル</label>
          <input type="text" id="meetingTitle" placeholder="例：週次定例ミーティング">
        </div>
        <div class="field" style="max-width:170px">
          <label>日付</label>
          <input type="date" id="meetingDate">
        </div>
        <div class="field" style="max-width:200px">
          <label>場所・備考</label>
          <input type="text" id="meetingMemo" placeholder="例：会議室A / Zoom">
        </div>
      </div>
    </div>

    <!-- Speakers -->
    <div class="card">
      <div class="card-title">👥 発言者の管理</div>
      <div class="speakers-area" id="speakersArea">
        <div class="add-speaker" onclick="openAddSpeaker()">＋ 追加</div>
      </div>
      <div style="font-size:.8rem;color:#a0aec0">発言者を選択してから録音すると、発言者名が自動的に記録されます</div>
    </div>

    <!-- Recording -->
    <div class="card">
      <div class="card-title">🎙️ 録音・文字起こし</div>
      <div class="rec-row">
        <button class="rec-btn start" id="recBtn" onclick="toggleRec()">
          <span>🎙️</span> 録音開始
        </button>
        <div class="rec-status" id="recStatus">発言者を選択してから録音開始してください</div>
      </div>
      <div style="margin-top:10px">
        <div class="interim" id="interimDiv"></div>
      </div>
      <div class="log-header" style="margin-top:8px">
        <span>📝 発言ログ</span>
        <button class="btn-sm" onclick="addManual()">＋ 手動追加</button>
      </div>
      <div class="log" id="logArea">
        <div class="empty-log" id="emptyLog">録音を開始すると発言が記録されます</div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="saveMinutes()">💾 保存</button>
        <button class="btn btn-secondary" onclick="exportTxt()">📄 TXTで出力</button>
        <button class="btn btn-green" onclick="exportExcel()">📊 Excelで出力</button>
        <button class="btn btn-danger" onclick="resetAll()">🗑️ リセット</button>
      </div>
    </div>
  </div>

  <!-- List Tab -->
  <div id="listTab" style="display:none">
    <div id="minutesList"></div>
  </div>
</div>

<!-- Add Speaker Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>👤 発言者を追加</h3>
    <input type="text" id="speakerNameInput" placeholder="名前を入力（例：山田）" maxlength="20">
    <div class="color-row" id="colorRow"></div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="addSpeaker()">追加</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = ['#e53e3e','#dd6b20','#d69e2e','#38a169','#2b6cb0','#6b46c1','#d53f8c','#2c7a7b'];
let speakers = JSON.parse(localStorage.getItem('spk') || '[{"name":"司会","color":"#2b6cb0"},{"name":"自分","color":"#38a169"}]');
let selectedSpeaker = null;
let log = []; // {time, speaker, color, text}
let recognition = null;
let isRec = false;
let currentId = null;
let minutes = JSON.parse(localStorage.getItem('minutes_data2') || '[]');
let pickedColor = COLORS[0];
let startTime = null;

document.getElementById('meetingDate').value = new Date().toISOString().split('T')[0];
updateBadge();
renderSpeakers();

// ── Speakers ──
function renderSpeakers() {
  const a = document.getElementById('speakersArea');
  a.innerHTML = '';
  speakers.forEach((s, i) => {
    const c = document.createElement('div');
    c.className = 'speaker-chip' + (selectedSpeaker === i ? ' selected' : '');
    c.innerHTML = `<span class="speaker-color" style="background:${s.color}"></span>${esc(s.name)}<span class="del" onclick="delSpeaker(event,${i})">✕</span>`;
    c.onclick = (e) => { if (!e.target.classList.contains('del')) selectSpeaker(i); };
    a.appendChild(c);
  });
  const add = document.createElement('div');
  add.className = 'add-speaker';
  add.textContent = '＋ 追加';
  add.onclick = openAddSpeaker;
  a.appendChild(add);
}

function selectSpeaker(i) {
  selectedSpeaker = (selectedSpeaker === i) ? null : i;
  renderSpeakers();
  const s = selectedSpeaker !== null ? speakers[selectedSpeaker] : null;
  if (s) document.getElementById('recStatus').textContent = `発言者：${s.name} ／ 録音開始ボタンを押してください`;
  else document.getElementById('recStatus').textContent = '発言者を選択してから録音開始してください';
}

function delSpeaker(e, i) {
  e.stopPropagation();
  speakers.splice(i, 1);
  if (selectedSpeaker === i) selectedSpeaker = null;
  else if (selectedSpeaker > i) selectedSpeaker--;
  saveSpeakers(); renderSpeakers();
}

function saveSpeakers() { localStorage.setItem('spk', JSON.stringify(speakers)); }

function openAddSpeaker() {
  document.getElementById('speakerNameInput').value = '';
  pickedColor = COLORS[speakers.length % COLORS.length];
  const cr = document.getElementById('colorRow');
  cr.innerHTML = COLORS.map(c => `<div class="color-dot${c===pickedColor?' sel':''}" style="background:${c}" onclick="pickColor('${c}',this)"></div>`).join('');
  document.getElementById('modalBg').className = 'modal-bg vis';
  setTimeout(() => document.getElementById('speakerNameInput').focus(), 100);
}

function closeModal() { document.getElementById('modalBg').className = 'modal-bg'; }

function pickColor(c, el) {
  pickedColor = c;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('sel'));
  el.classList.add('sel');
}

function addSpeaker() {
  const n = document.getElementById('speakerNameInput').value.trim();
  if (!n) { showToast('⚠️ 名前を入力してください'); return; }
  speakers.push({ name: n, color: pickedColor });
  saveSpeakers(); renderSpeakers(); closeModal();
}

document.getElementById('speakerNameInput').addEventListener('keydown', e => { if (e.key === 'Enter') addSpeaker(); });

// ── Recording ──
function toggleRec() { isRec ? stopRec() : startRec(); }

function startRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('⚠️ Chrome推奨です（音声認識未対応）'); return; }
  startTime = new Date();
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    if (final) {
      const sp = selectedSpeaker !== null ? speakers[selectedSpeaker] : null;
      addLogEntry(nowStr(), sp ? sp.name : '不明', sp ? sp.color : '#a0aec0', final.trim());
    }
    const id = document.getElementById('interimDiv');
    if (interim) { id.textContent = '🎙️ ' + interim; id.className = 'interim vis'; }
    else id.className = 'interim';
  };
  recognition.onerror = (e) => { if (e.error !== 'aborted') showToast('エラー: ' + e.error); stopRec(); };
  recognition.onend = () => { if (isRec) recognition.start(); };
  recognition.start();
  isRec = true;
  const btn = document.getElementById('recBtn');
  btn.innerHTML = '<span class="pulse"></span> 録音停止';
  btn.className = 'rec-btn stop';
  const st = document.getElementById('recStatus');
  const sp = selectedSpeaker !== null ? speakers[selectedSpeaker] : null;
  st.textContent = '🔴 録音中' + (sp ? `（発言者：${sp.name}）` : '');
  st.className = 'rec-status on';
}

function stopRec() {
  isRec = false;
  if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; }
  document.getElementById('recBtn').innerHTML = '<span>🎙️</span> 録音開始';
  document.getElementById('recBtn').className = 'rec-btn start';
  document.getElementById('recStatus').textContent = '録音を停止しました';
  document.getElementById('recStatus').className = 'rec-status';
  document.getElementById('interimDiv').className = 'interim';
}

function nowStr() {
  const n = new Date();
  return `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
}
function pad(n) { return String(n).padStart(2, '0'); }

function addLogEntry(time, who, color, text) {
  const entry = { time, who, color, text };
  log.push(entry);
  renderLog();
}

function renderLog() {
  const area = document.getElementById('logArea');
  const empty = document.getElementById('emptyLog');
  if (!log.length) { area.innerHTML = '<div class="empty-log" id="emptyLog">録音を開始すると発言が記録されます</div>'; return; }
  area.innerHTML = log.map((e, i) => `
    <div class="log-entry" style="border-left-color:${e.color}">
      <div class="time">${e.time}</div>
      <div class="who" style="color:${e.color}">${esc(e.who)}</div>
      <div class="txt" contenteditable="true" oninput="log[${i}].text=this.textContent">${esc(e.text)}</div>
      <span class="del-entry" onclick="delEntry(${i})">✕</span>
    </div>`).join('');
  area.scrollTop = area.scrollHeight;
}

function delEntry(i) { log.splice(i, 1); renderLog(); }

function addManual() {
  const sp = selectedSpeaker !== null ? speakers[selectedSpeaker] : null;
  const who = sp ? sp.name : (speakers[0] ? speakers[0].name : '不明');
  const color = sp ? sp.color : (speakers[0] ? speakers[0].color : '#a0aec0');
  addLogEntry(nowStr(), who, color, '（ここに発言内容を入力）');
}

// ── Export ──
function buildData() {
  const title = document.getElementById('meetingTitle').value.trim() || '無題の議事録';
  const date = document.getElementById('meetingDate').value;
  const memo = document.getElementById('meetingMemo').value.trim();
  return { title, date, memo, log };
}

function exportTxt() {
  const d = buildData();
  let txt = `【議事録】${d.title}\n`;
  txt += `日付：${d.date}\n`;
  if (d.memo) txt += `備考：${d.memo}\n`;
  txt += '─'.repeat(44) + '\n\n';
  if (!d.log.length) { showToast('⚠️ 発言ログが空です'); return; }
  d.log.forEach(e => { txt += `[${e.time}] ${e.who}\n${e.text}\n\n`; });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' }));
  a.download = d.title + '.txt';
  a.click();
  showToast('📄 TXTを出力しました');
}

function exportExcel() {
  const d = buildData();
  if (!d.log.length) { showToast('⚠️ 発言ログが空です'); return; }
  const wb = XLSX.utils.book_new();
  // Sheet1: Meta
  const meta = [['会議タイトル', d.title], ['日付', d.date], ['備考', d.memo]];
  const ws1 = XLSX.utils.aoa_to_sheet(meta);
  ws1['!cols'] = [{wch:16},{wch:40}];
  XLSX.utils.book_append_sheet(wb, ws1, '概要');
  // Sheet2: Log
  const rows = [['時刻', '発言者', '発言内容']];
  d.log.forEach(e => rows.push([e.time, e.who, e.text]));
  const ws2 = XLSX.utils.aoa_to_sheet(rows);
  ws2['!cols'] = [{wch:10},{wch:14},{wch:60}];
  XLSX.utils.book_append_sheet(wb, ws2, '発言ログ');
  XLSX.writeFile(wb, d.title + '.xlsx');
  showToast('📊 Excelを出力しました');
}

// ── Save / Load ──
function saveMinutes() {
  const d = buildData();
  if (!d.log.length && !d.title) { showToast('⚠️ 内容が空です'); return; }
  const entry = { id: currentId || Date.now(), ...d, saved: new Date().toISOString() };
  const idx = minutes.findIndex(m => m.id === entry.id);
  if (idx >= 0) minutes[idx] = entry; else minutes.unshift(entry);
  currentId = entry.id;
  localStorage.setItem('minutes_data2', JSON.stringify(minutes));
  updateBadge();
  showToast('✅ 保存しました');
}

function resetAll() {
  if (!confirm('現在の議事録をリセットしますか？')) return;
  if (isRec) stopRec();
  currentId = null;
  log = [];
  document.getElementById('meetingTitle').value = '';
  document.getElementById('meetingDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('meetingMemo').value = '';
  renderLog();
  showToast('🗑️ リセットしました');
}

function updateBadge() { document.getElementById('countBadge').textContent = minutes.length; }

function switchTab(tab) {
  document.getElementById('editorTab').style.display = tab === 'editor' ? '' : 'none';
  document.getElementById('listTab').style.display = tab === 'list' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) => t.className = 'tab' + ((tab === 'editor' ? i === 0 : i === 1) ? ' active' : ''));
  if (tab === 'list') renderList();
}

function renderList() {
  const el = document.getElementById('minutesList');
  if (!minutes.length) {
    el.innerHTML = '<div class="empty"><div class="ei">📭</div><div>保存済みの議事録がありません</div></div>';
    return;
  }
  el.innerHTML = minutes.map(m => `
    <div class="mc">
      <div class="mc-header">
        <div class="mc-title">📋 ${esc(m.title)}</div>
        <div class="mc-date">${m.date || ''}</div>
      </div>
      <div class="mc-preview">発言 ${m.log ? m.log.length : 0} 件${m.memo ? '　' + esc(m.memo) : ''}</div>
      <div class="mc-acts">
        <button class="btn-sm" onclick="loadMinutes(${m.id})">✏️ 編集</button>
        <button class="btn-sm" onclick="exportSavedTxt(${m.id})">📄 TXT</button>
        <button class="btn-sm" onclick="exportSavedExcel(${m.id})">📊 Excel</button>
        <button class="btn-sm" style="color:#e53e3e" onclick="deleteMinutes(${m.id})">🗑️ 削除</button>
      </div>
    </div>`).join('');
}

function loadMinutes(id) {
  const m = minutes.find(x => x.id === id);
  if (!m) return;
  currentId = m.id;
  document.getElementById('meetingTitle').value = m.title;
  document.getElementById('meetingDate').value = m.date || '';
  document.getElementById('meetingMemo').value = m.memo || '';
  log = m.log || [];
  renderLog();
  switchTab('editor');
  showToast('📂 読み込みました');
}

function exportSavedTxt(id) {
  const m = minutes.find(x => x.id === id);
  if (!m) return;
  let txt = `【議事録】${m.title}\n日付：${m.date}\n`;
  if (m.memo) txt += `備考：${m.memo}\n`;
  txt += '─'.repeat(44) + '\n\n';
  (m.log || []).forEach(e => { txt += `[${e.time}] ${e.who}\n${e.text}\n\n`; });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' }));
  a.download = m.title + '.txt';
  a.click();
}

function exportSavedExcel(id) {
  const m = minutes.find(x => x.id === id);
  if (!m || !m.log) return;
  const wb = XLSX.utils.book_new();
  const meta = [['会議タイトル', m.title], ['日付', m.date], ['備考', m.memo || '']];
  const ws1 = XLSX.utils.aoa_to_sheet(meta);
  ws1['!cols'] = [{wch:16},{wch:40}];
  XLSX.utils.book_append_sheet(wb, ws1, '概要');
  const rows = [['時刻', '発言者', '発言内容']];
  m.log.forEach(e => rows.push([e.time, e.who, e.text]));
  const ws2 = XLSX.utils.aoa_to_sheet(rows);
  ws2['!cols'] = [{wch:10},{wch:14},{wch:60}];
  XLSX.utils.book_append_sheet(wb, ws2, '発言ログ');
  XLSX.writeFile(wb, m.title + '.xlsx');
}

function deleteMinutes(id) {
  if (!confirm('削除しますか？')) return;
  minutes = minutes.filter(m => m.id !== id);
  localStorage.setItem('minutes_data2', JSON.stringify(minutes));
  updateBadge(); renderList();
  showToast('🗑️ 削除しました');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2500);
}
</script>
</body>
</html>
